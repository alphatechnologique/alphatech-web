<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Alpha Tech Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00205b;
	--primary-dark: #001540;
	--accent: #fe5000;
            --gray-50: #f9fafb;
            --gray-600: #4b5563;
            --gray-900: #111827;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: white;
            color: var(--gray-900);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        nav {
            background: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            padding: 0 2rem;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
        }

        .logo {
            height: 130px;
            width: auto;
            display: block;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            background: var(--gray-50);
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 4rem 3rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08);
            animation: fadeUp 0.7s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-wrap {
            width: 90px;
            height: 90px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: popIn 0.5s 0.4s ease both;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .icon-wrap svg {
            width: 44px;
            height: 44px;
            stroke: white;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.15rem;
            color: var(--gray-600);
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .highlight {
            display: inline-block;
            background: var(--gray-50);
            border-left: 4px solid var(--accent);
            border-radius: 0 8px 8px 0;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 2.5rem;
            text-align: left;
            width: 100%;
        }

        .btn-home {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.9rem 2.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn-home:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26,61,92,0.25);
        }

        /* Footer */
        footer {
            background: var(--gray-900);
            color: white;
            padding: 2rem;
            text-align: center;
            font-size: 0.9rem;
        }

        footer p {
            opacity: 0.7;
        }

        @media (max-width: 640px) {
            .card {
                padding: 3rem 1.5rem;
            }

            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <img src="logob.svg" alt="Alpha Tech Solutions" class="logo">
        </div>
    </nav>

    <main>
        <div class="card">
            <div class="icon-wrap">
                <svg viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>

            <h1>Message received!</h1>
            <p class="subtitle">Thank you for reaching out. We have successfully received your information.</p>

            <div class="highlight">
                ✦ &nbsp;An advisor will get in touch with you as soon as possible.
            </div>

            <a href="en.html" class="btn-home">Back to home</a>
        </div>
    </main>

    <footer>
        <div>
            <p>&copy; 2025 Alpha Tech Solutions. Engineering-driven. Execution-focused.</p>
        </div>
    </footer>

</body>
</html>
