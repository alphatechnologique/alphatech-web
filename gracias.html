<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensaje Enviado — Alpha Tech Solutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Orbitron:wght@800&family=Rajdhani:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #00205B;
      --navy-dark: #001540;
      --navy-deep: #06090F;
      --teal: #008EAA;
      --white: #FFFFFF;
    }
    body {
      background: var(--navy-deep);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .logo-wrap {
      margin-bottom: 56px;
    }
    .logo-wrap svg { display: block; }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 56px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 56px;
      height: 56px;
      background: rgba(0,142,170,0.12);
      border: 1px solid rgba(0,142,170,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }
    .icon svg { display: block; }
    .eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      color: var(--white);
      margin-bottom: 16px;
      line-height: 1.3;
    }
    p {
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: var(--teal);
      color: var(--white);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .btn:hover { background: #0099B8; }
    .divider {
      width: 32px;
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 40px auto 0;
    }
    .footer-note {
      margin-top: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <img src="logo-solutions-v2.svg" alt="Alpha Tech Solutions" height="40" style="display:block;height:40px;width:auto">
  </div>

  <div class="card">
    <div class="icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#008EAA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="eyebrow">Mensaje recibido</div>
    <h1>Gracias por contactarnos</h1>
    <p>Nuestro equipo revisará tu solicitud y te responderá dentro de las próximas 24 horas hábiles.</p>
    <a href="index.html" class="btn">Volver al inicio</a>
    <div class="divider"></div>
    <div class="footer-note">Alpha Tech Solutions S.A.C. · Lima, Perú</div>
  </div>

</body>
</html>
