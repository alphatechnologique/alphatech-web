<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 78" role="img" aria-label="Alpha Tech Simulations">
  <!-- RADAR SCOPE: 3 concentric arcs (shared architecture with Solutions) -->
  <path d="M 38,20 A 36,36 0 1 1 9,70" stroke="#FFFFFF" stroke-width="1.4" fill="none" opacity="0.48" stroke-linecap="round"/>
  <path d="M 38,32 A 24,24 0 1 1 17,70" stroke="#FFFFFF" stroke-width="1.1" fill="none" opacity="0.32" stroke-linecap="round"/>
  <path d="M 38,44 A 12,12 0 1 1 27,65" stroke="#FFFFFF" stroke-width="0.9" fill="none" opacity="0.22" stroke-linecap="round"/>
  <!-- Radar origin -->
  <circle cx="38" cy="56" r="2.2" fill="#FFFFFF" opacity="0.6"/>
  <!-- Subtle crosshair -->
  <line x1="38" y1="48" x2="38" y2="64" stroke="#FFFFFF" stroke-width="0.6" opacity="0.2"/>
  <line x1="30" y1="56" x2="46" y2="56" stroke="#FFFFFF" stroke-width="0.6" opacity="0.2"/>
  <!-- Signal pulse: radar origin -> emitter -->
  <line x1="38" y1="56" x2="65" y2="22" stroke="#FE5000" stroke-width="1.3" opacity="0.55" stroke-linecap="round"/>
  <circle cx="62" cy="24" r="3.2" fill="#FE5000"/>
  <!-- Flight path / contrail (apex at y=2, ends at y=22 right above ALPHA TECH baseline) -->
  <path d="M 65,22 Q 200,2 340,22" stroke="#FE5000" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <!-- Commercial airliner silhouette — fuselage centerline ON the contrail line (y=22), slight bank (7°) to match trajectory tangent -->
  <g transform="translate(348,22) rotate(7)">
    <!-- Fuselage + wings + horizontal stabilizer -->
    <path d="M 14,0
             C 13.4,-0.6 12,-1 9,-1.3
             L 5,-1.5
             L -2,-9.5
             L -5,-9
             L -5,-1.8
             L -9,-1.5
             L -11,-1.3
             L -13,-4.8
             L -14.5,-4.5
             L -14.2,-0.7
             L -15,0
             L -14.2,0.7
             L -14.5,4.5
             L -13,4.8
             L -11,1.3
             L -9,1.5
             L -5,1.8
             L -5,9
             L -2,9.5
             L 5,1.5
             C 12,1 13.4,0.6 14,0
             Z" fill="#FE5000"/>
    <!-- Engine nacelles (commercial cue) -->
    <ellipse cx="-1" cy="-5.2" rx="2.6" ry="0.75" fill="#FE5000"/>
    <ellipse cx="-1" cy="5.2" rx="2.6" ry="0.75" fill="#FE5000"/>
    <!-- Cockpit canopy + cabin window strip -->
    <ellipse cx="7" cy="0" rx="2.2" ry="0.55" fill="#FFFFFF" opacity="0.55"/>
    <line x1="-4" y1="0" x2="3" y2="0" stroke="#FFFFFF" stroke-width="0.35" opacity="0.35"/>
  </g>
  <!-- Wordmark -->
  <text x="88" y="44" font-family="Orbitron,sans-serif" font-size="22" font-weight="800" fill="#FFFFFF" letter-spacing="1.8">ALPHA TECH</text>
  <text x="89" y="64" font-family="Rajdhani,sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.88)" letter-spacing="4.5">SIMULATIONS</text>
</svg>
