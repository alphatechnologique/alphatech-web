<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Alpha Tech Solutions">
  <!-- Radar sweep arc (1 arc = legible @ 16px, preserves radar DNA) -->
  <path d="M 10,54 A 26,26 0 0 1 44,14" stroke="currentColor" stroke-width="2.4" fill="none" opacity="0.55" stroke-linecap="round"/>
  <!-- Radar origin -->
  <circle cx="10" cy="54" r="2.8" fill="currentColor"/>
  <!-- Signal ray -->
  <path d="M 10,54 L 40,26" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <!-- Precision target -->
  <polygon points="56,30 52,36.5 44,36.5 40,30 44,23.5 52,23.5" fill="currentColor"/>
</svg>
